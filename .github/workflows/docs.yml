name: Docs

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy after the docs build completes"
        required: true
        default: false
        type: boolean

concurrency:
  group: docs-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Docs
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      DOCS_SITE_URL: https://www.spoke.sh
      DOCS_BASE_URL: /transit/
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24.13.0
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install website dependencies
        run: npm --prefix website ci

      - name: Build docs site
        run: npm --prefix website run build

      - name: Upload static site artifact
        uses: actions/upload-artifact@v4
        with:
          name: transit-docs-site
          path: website/build
          if-no-files-found: error

  deploy:
    name: Deploy Docs
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: prod
    if: >-
      (
        github.event_name == 'push' &&
        github.ref == 'refs/heads/main' &&
        vars.TRANSIT_DOCS_AWS_ROLE_ARN != ''
      ) ||
      (
        github.event_name == 'workflow_dispatch' &&
        inputs.deploy &&
        vars.TRANSIT_DOCS_AWS_ROLE_ARN != ''
      )
    permissions:
      contents: read
      id-token: write
    env:
      TRANSIT_DOCS_BUCKET: ${{ vars.TRANSIT_DOCS_BUCKET != '' && vars.TRANSIT_DOCS_BUCKET || 'spoke-previews' }}
      TRANSIT_DOCS_AWS_ROLE_ARN: ${{ vars.TRANSIT_DOCS_AWS_ROLE_ARN }}
      AWS_REGION: ${{ vars.TRANSIT_DOCS_AWS_REGION != '' && vars.TRANSIT_DOCS_AWS_REGION || 'us-east-1' }}
    steps:
      - name: Validate deploy configuration
        shell: bash
        run: |
          set -euo pipefail
          missing=0

          for name in TRANSIT_DOCS_AWS_ROLE_ARN; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required repository variable: $name" >&2
              missing=1
            fi
          done

          if [[ "${missing}" -ne 0 ]]; then
            exit 1
          fi

      - uses: actions/download-artifact@v5
        with:
          name: transit-docs-site
          path: website-build-stable

      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24.13.0
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install website dependencies
        run: npm --prefix website ci

      - uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.TRANSIT_DOCS_AWS_ROLE_ARN }}

      - name: Derive branch publication path
        id: branch
        shell: bash
        run: |
          set -euo pipefail
          branch="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          branch="${branch//\//-}"
          echo "name=${branch}" >> "${GITHUB_OUTPUT}"

      - name: Build preview docs site
        env:
          DOCS_SITE_URL: https://www.spoke.sh
          DOCS_BASE_URL: /previews/transit/${{ steps.branch.outputs.name }}/
        run: |
          npm --prefix website run build
          mv website/build website-build-preview

      - name: Sync stable docs to S3
        run: aws s3 sync website-build-stable/ "s3://${TRANSIT_DOCS_BUCKET}/stable/transit/" --delete

      - name: Sync preview docs to S3
        run: aws s3 sync website-build-preview/ "s3://${TRANSIT_DOCS_BUCKET}/transit/${{ steps.branch.outputs.name }}/" --delete
